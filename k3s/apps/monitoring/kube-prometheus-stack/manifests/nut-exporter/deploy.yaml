apiVersion: apps/v1
kind: Deployment
metadata:
  name: nut-exporter
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nut-exporter
  template:
    metadata:
      labels:
        app: nut-exporter
    spec:
      containers:
        - name: nut-exporter
          image: "hon95/prometheus-nut-exporter:1.2.1"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9995
              name: metrics
          env:
            - name: TZ
              value: "Europe/Athens"
            - name: HTTP_PATH
              value: "/metrics"
