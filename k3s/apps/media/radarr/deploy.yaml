apiVersion: apps/v1
kind: Deployment
metadata:
  name: radarr
  namespace: media
  labels:
    app: radarr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: radarr
  template:
    metadata:
      labels:
        app: radarr
    spec:
      containers:
        - name: radarr
          image: "lscr.io/linuxserver/radarr:amd64-6.1.1"
          ports:
            - containerPort: 7878
          envFrom:
            - configMapRef:
                name: media-env
          volumeMounts:
            - name: radarr-config
              mountPath: /config

            - name: media
              mountPath: /data

      volumes:
        - name: radarr-config
          persistentVolumeClaim:
            claimName: radarr-pvc

        - name: media
          persistentVolumeClaim:
            claimName: media-pvc
