apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis
  namespace: argocd
spec:
  destination:
    namespace: databases
    server: https://kubernetes.default.svc
  sources:
    - repoURL: oci://registry-1.docker.io/bitnamicharts/redis
      targetRevision: 25.3.11
      helm:
        valueFiles:
          - $values/k3s/apps/databases/redis/values.yaml

    - repoURL: https://github.com/manos-grigorakis/home-lab.git
      targetRevision: main
      path: k3s/apps/databases/redis
      ref: values
  project: default
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
