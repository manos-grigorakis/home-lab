apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
  namespace: argocd
spec:
  destination:
    namespace: longhorn-system
    server: https://kubernetes.default.svc
  sources:
    - repoURL: https://charts.longhorn.io/
      chart: longhorn
      targetRevision: v1.9.1
      helm:
        valueFiles:
          - $values/k3s/infra/longhorn/values.yaml

    - repoURL: https://github.com/manos-grigorakis/home-lab.git
      targetRevision: main
      path: k3s/infra/longhorn
      ref: values
  project: default
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
