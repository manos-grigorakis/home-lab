apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubernetes-dashboard
  namespace: argocd
spec:
  destination:
    namespace: kubernetes-dashboard
    server: https://kubernetes.default.svc
  sources:
    - repoURL: https://github.com/manos-grigorakis/home-lab.git
      targetRevision: feat/kubernetes-dashboard
      path: k3s/infra/kubernetes-dashboard
  project: default
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
