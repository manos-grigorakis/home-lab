apiVersion: v1
kind: ServiceAccount
metadata:
  name: homelab-hub-reader
  namespace: default

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: homelab-hub-reader
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: homelab-hub-reader-binding
subjects:
  - kind: ServiceAccount
    name: homelab-hub-reader
    namespace: default
roleRef:
  kind: ClusterRole
  name: homelab-hub-reader
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: v1
kind: Secret
metadata:
  name: homelab-hub-reader-token
  namespace: default
  annotations:
    kubernetes.io/service-account.name: homelab-hub-reader
type: kubernetes.io/service-account-token
