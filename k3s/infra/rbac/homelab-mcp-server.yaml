apiVersion: v1
kind: ServiceAccount
metadata:
  name: homelab-mcp-reader
  namespace: default

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: homelab-mcp-read
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes", "services", "events", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "daemonsets", "statefulsets", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes", "pods"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: homelab-mcp-read-binding
subjects:
  - kind: ServiceAccount
    name: homelab-mcp-reader
    namespace: default
roleRef:
  kind: ClusterRole
  name: homelab-mcp-read
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: v1
kind: Secret
metadata:
  name: homelab-mcp-reader-token
  namespace: default
  annotations:
    kubernetes.io/service-account.name: homelab-mcp-reader
type: kubernetes.io/service-account-token
